name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  GODOT_TEMPLATE_VERSION: 4.6.3.stable
  GODOT_TEMPLATE_URL: https://github.com/godotengine/godot/releases/download/4.6.3-stable/Godot_v4.6.3-stable_export_templates.tpz

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.6.3
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Restore export templates cache
        id: templates-cache
        uses: actions/cache@v4
        with:
          path: /github/home/.local/share/godot/export_templates/4.6.3.stable
          key: godot-export-templates-4.6.3

      - name: Install export templates
        if: steps.templates-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p "$HOME/.local/share/godot/export_templates/$GODOT_TEMPLATE_VERSION"
          wget -O /tmp/godot-export-templates.tpz "$GODOT_TEMPLATE_URL"
          unzip -q -j /tmp/godot-export-templates.tpz "templates/*" -d "$HOME/.local/share/godot/export_templates/$GODOT_TEMPLATE_VERSION"

      - name: Prepare export directory
        run: mkdir -p build/web

      - name: Export web build
        run: godot --headless --path . --export-release "Web" build/web/index.html

      - name: Add nojekyll marker
        run: touch build/web/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: build/web

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
